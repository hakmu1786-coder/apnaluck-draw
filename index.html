<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apna Luck - Mega Giveaway</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        body {
            background: linear-gradient(135deg, #111a2e 0%, #1a2a4a 100%);
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .giveaway-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid #dfb76c;
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .logo-box {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            border-radius: 50%;
            border: 3px solid #dfb76c;
            box-shadow: 0 0 15px #dfb76c;
            overflow: hidden;
            background-color: #000;
        }
        .logo-box img {
            width: 100%; height: 100%; object-fit: cover;
        }

        h1 { font-size: 24px; color: #dfb76c; text-shadow: 0 2px 4px rgba(0,0,0,0.3); margin-bottom: 5px; }
        .subtitle { font-size: 14px; color: #bdc3c7; margin-bottom: 20px; }

        .prize-pool {
            background: linear-gradient(90deg, #b38728, #fbf5b7, #daaf38, #aa771c);
            color: #111; font-weight: bold; padding: 10px; border-radius: 10px; font-size: 16px; margin-bottom: 20px;
        }

        .input-group { margin-bottom: 15px; text-align: left; }
        label { display: block; font-size: 12px; color: #dfb76c; margin-bottom: 5px; font-weight: bold; }
        input {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #4a5a80;
            background: rgba(16, 26, 46, 0.6); color: #fff; font-size: 14px; outline: none;
        }
        input:focus { border-color: #dfb76c; box-shadow: 0 0 8px rgba(223, 183, 108, 0.4); }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-submit { background: linear-gradient(45deg, #dfb76c, #aa771c); color: #111; }
        .btn-register { background: linear-gradient(45deg, #1e7e34, #28a745); color: white; margin-top: 15px; }

        .status-msg { margin-top: 15px; font-size: 14px; font-weight: bold; }
        .timer-box { font-size: 13px; color: #ff4d4d; margin-top: 5px; display: none; }

        .winner-section { margin-top: 25px; background: rgba(0, 0, 0, 0.3); border-top: 1px solid #4a5a80; padding: 15px; border-radius: 10px; }
        .winner-title { font-size: 13px; color: #28a745; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; }
        .winner-details { font-size: 15px; font-weight: bold; color: #fff; }

        /* Secret Admin Panel CSS */
        .admin-trigger { margin-top: 20px; font-size: 11px; color: #4a5a80; cursor: pointer; text-decoration: underline; }
        .admin-panel { display: none; margin-top: 15px; background: rgba(255, 0, 0, 0.1); border: 1px dashed #ff4d4d; padding: 15px; border-radius: 10px; width: 100%; max-width: 450px; text-align: left; }
        .admin-btn { padding: 8px 12px; background: #ff4d4d; color: #fff; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 12px;}
        .admin-btn-reset { background: #6c757d; margin-left: 10px; }
    </style>
</head>
<body>

    <div class="giveaway-card">
        <div class="logo-box">
            <img src="7118.jpg" alt="Apna Luck Logo" onerror="this.src='https://placehold.co/120?text=Apna+Luck'">
        </div>

        <h1>APNA LUCK GIVEAWAY</h1>
        <p class="subtitle">हर 24 घंटे में भाग्य आजमाएं और जीतें</p>

        <div class="prize-pool">🎁 इनामी राशि: ₹100 से ₹500 तक!</div>

        <button class="btn btn-register" onclick="window.open('https://apnaluck.com/register?refer=774167', '_blank')">📲 रजिस्टर करें (Direct Link)</button>

        <hr style="border: 0; border-top: 1px solid #4a5a80; margin: 20px 0;">

        <form id="drawForm" onsubmit="participateDraw(event)">
            <div class="input-group">
                <label>यूजरनेम (Username)</label>
                <input type="text" id="username" placeholder="अपना यूजरनेम दर्ज करें" required>
            </div>
            <div class="input-group">
                <label>मोबाइल नंबर (Mobile Number)</label>
                <input type="tel" id="mobile" pattern="[0-9]{10}" placeholder="10 अंकों का नंबर लिखें" required>
            </div>
            <button type="submit" id="submitBtn" class="btn btn-submit">🎰 लकी ड्रा में भाग लें</button>
        </form>

        <div id="statusMsg" class="status-msg"></div>
        <div id="timerBox" class="timer-box">अगला ड्रा ओपन होने का समय: <span id="countdown">24:00:00</span></div>

        <div class="winner-section">
            <div class="winner-title">🏆 पिछला लकी विजेता 🏆</div>
            <div class="winner-details" id="lastWinnerDisplay">Loading...</div>
        </div>
    </div>

    <div class="admin-trigger" onclick="openAdminPanel()">🛠 Admin Control Panel</div>

    <div class="admin-panel" id="adminPanel">
        <h3 style="color: #ff4d4d; font-size: 14px; margin-bottom: 10px;">🔒 Admin Panel (Secret)</h3>
        <p style="font-size: 13px;">कुल पार्टिसिपेंट्स: <span id="totalParticipantsCount" style="font-weight:bold; color:#dfb76c;">0</span></p>
        
        <button class="admin-btn" onclick="triggerAdminDraw()">🎰 अभी Winner चुनें</button>
        <button class="admin-btn admin-btn-reset" onclick="resetParticipants()">🧹 List साफ़ करें</button>
    </div>

<script>
    window.onload = function() {
        checkParticipationStatus();
        updateWinnerDisplay();
        updateAdminStats();
    };

    function participateDraw(e) {
        e.preventDefault();
        
        const username = document.getElementById('username').value.trim();
        const mobile = document.getElementById('mobile').value.trim();
        
        if(mobile.length !== 10) {
            alert("कृपया सही 10 अंकों का मोबाइल नंबर डालें।");
            return;
        }

        // 1. सिर्फ पार्टिसिपेंट को लिस्ट में सेव करना (विनर तुरंत नहीं बनेगा)
        let participants = JSON.parse(localStorage.getItem('apnaLuck_participants')) || [];
        participants.push({ username: username, mobileEnd: mobile.slice(-4) });
        localStorage.setItem('apnaLuck_participants', JSON.stringify(participants));

        // 2. 24 घंटे का लॉक लगाएं
        const expiryTime = new Date().getTime() + (24 * 60 * 60 * 1000); 
        localStorage.setItem('apnaLuck_lockUntil', expiryTime);

        alert(`🎉 बधाई हो! आप लकी ड्रा में सफलतापूर्वक शामिल हो गए हैं। विजेता की घोषणा Admin द्वारा की जाएगी।`);
        location.reload();
    }

    // --- ADMIN PANEL FUNCTIONS ---
    
    function openAdminPanel() {
        const password = prompt("Admin पासवर्ड दर्ज करें:");
        if (password === "admin123") { // Aap is password ko change kar sakte hain
            document.getElementById('adminPanel').style.display = 'block';
            updateAdminStats();
            alert("Admin Access Granted!");
        } else if (password !== null) {
            alert("गलत पासवर्ड!");
        }
    }

    function updateAdminStats() {
        let participants = JSON.parse(localStorage.getItem('apnaLuck_participants')) || [];
        document.getElementById('totalParticipantsCount').innerText = participants.length;
    }

    function triggerAdminDraw() {
        let participants = JSON.parse(localStorage.getItem('apnaLuck_participants')) || [];
        
        if (participants.length === 0) {
            alert("❌ अभी तक किसी भी यूजर ने भाग नहीं लिया है!");
            return;
        }

        // पूरी लिस्ट से किसी भी एक को रैंडम उठाना
        const randomIndex = Math.floor(Math.random() * participants.length);
        const winner = participants[randomIndex];
        
        // ₹100 से ₹500 के बीच रैंडम इनामी राशि बनाना
        const randomPrize = Math.floor(Math.random() * (500 - 100 + 1)) + 100;

        const winnerData = {
            username: winner.username,
            mobileEnd: winner.mobileEnd,
            prize: randomPrize
        };
        
        // विनर सेट करना
        localStorage.setItem('apnaLuck_lastWinner', JSON.stringify(winnerData));
        
        alert(`🎉 Winner चुन लिया गया है: ${winner.username}`);
        location.reload();
    }

    function resetParticipants() {
        if(confirm("क्या आप सच में सभी पार्टिसिपेंट्स की लिस्ट डिलीट करना चाहते हैं?")) {
            localStorage.removeItem('apnaLuck_participants');
            alert("पार्टिसिपेंट्स लिस्ट साफ़ कर दी गई है।");
            location.reload();
        }
    }

    // --- COUTDOWN & DISPLAY FUNCTIONS ---

    function checkParticipationStatus() {
        const lockUntil = localStorage.getItem('apnaLuck_lockUntil');
        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMsg');
        const timerBox = document.getElementById('timerBox');

        if (lockUntil) {
            const now = new Date().getTime();
            if (now < lockUntil) {
                submitBtn.disabled = true;
                submitBtn.style.background = '#4a5a80';
                submitBtn.style.cursor = 'not-allowed';
                submitBtn.innerText = "आप भाग ले चुके हैं";
                statusMsg.style.color = '#ff4d4d';
                statusMsg.innerText = "❌ आप इस ड्रा में भाग ले चुके हैं! अगले ड्रा का इंतजार करें।";
                timerBox.style.display = 'block';
                startCountdown(lockUntil);
            } else {
                localStorage.removeItem('apnaLuck_lockUntil');
                resetFormUI();
            }
        }
    }

    function resetFormUI() {
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').style.background = 'linear-gradient(45deg, #dfb76c, #aa771c)';
        document.getElementById('submitBtn').innerText = "🎰 लकी ड्रा में भाग लें";
        document.getElementById('statusMsg').innerText = "";
        document.getElementById('timerBox').style.display = 'none';
    }

    function startCountdown(endTime) {
        const timerInterval = setInterval(function() {
            const distance = endTime - new Date().getTime();
            if (distance < 0) {
                clearInterval(timerInterval);
                resetFormUI();
                return;
            }
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("countdown").innerHTML = 
                (hours < 10 ? "0" + hours : hours) + ":" + 
                (minutes < 10 ? "0" + minutes : minutes) + ":" + 
                (seconds < 10 ? "0" + seconds : seconds);
        }, 1000);
    }

    function updateWinnerDisplay() {
        const lastWinner = localStorage.getItem('apnaLuck_lastWinner');
        const display = document.getElementById('lastWinnerDisplay');

        if(lastWinner) {
            const data = JSON.parse(lastWinner);
            display.innerHTML = `👤 User: <span style="color:#dfb76c">${data.username}</span> (******${data.mobileEnd}) <br> 💰 जीती राशि: <span style="color:#28a745; font-size:16px;">₹${data.prize}</span>`;
        } else {
            display.innerHTML = `👤 User: <span style="color:#dfb76c">Lokesh_77</span> (******4167) <br> 💰 जीती राशि: <span style="color:#28a745; font-size:16px;">₹350</span>`;
        }
    }
</script>

</body>
</html>
